# .github/workflows/forge-ci.yml
# Forge CI — runs on every PR push
# Copy to your project's .github/workflows/ directory
#
# Handles: tests, linting, semgrep security scan, build verification
# LLM-based review + staging deploy stay local (need API keys + Docker access)

name: forge-ci

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
